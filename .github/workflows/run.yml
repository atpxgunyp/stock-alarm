name: Market Hours Monitor
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    # Node.js 24 환경을 즉시 사용하도록 설정
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # 최신 Node.js 환경에서 구동되는 v4/v5 유지 (환경 변수로 강제 적용)
      - uses: actions/checkout@v4 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas finance-datareader pyupbit pytz requests
          
      - name: Run Realtime Loop
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
