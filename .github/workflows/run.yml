name: Stock and Crypto Bot

on:
  schedule:
    - cron: '0,30 * * * *'  # 30분마다 실행
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==1.5.3  # 가장 안정적인 버전으로 고정
          pip install numpy==1.23.5
          pip install FinanceDataReader requests pytz pyupbit pandas_ta
          
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
