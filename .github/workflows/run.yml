name: Stock-Bot-Auto
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch: # 수동 실행 버튼
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v3에서 v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.11' # 파이썬 버전도 최신 안정화 버전으로 업그레이드

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install finance-datareader pandas_ta python-telegram-bot pytz

      - name: Start Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
