name: Market Hours Monitor
on:
  schedule:
    - cron: '0 */4 * * *' # 4시간마다 스케줄러가 확인
  workflow_dispatch: # 직접 [Run workflow] 버튼을 눌러 즉시 시작 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Dependencies
        run: |
          pip install pandas finance-datareader pyupbit pytz requests
      - name: Run Realtime Loop
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
