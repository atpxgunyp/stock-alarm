name: Stock and Crypto Bot

on:
  schedule:
    - cron: '0,30 * * * *'  # 30분마다 실행
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'  # 호환성이 가장 좋은 3.10으로 변경

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.0.3  # 안정적인 버전으로 고정
          pip install FinanceDataReader requests pytz pyupbit
          pip install git+https://github.com/twopirllc/pandas-ta.git  # pandas_ta 직접 설치
          
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
