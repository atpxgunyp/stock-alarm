name: Simple Market Monitor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 3.11 이상 권장

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # finance-datareader (소문자/하이픈)로 설치 시도
          pip install pandas finance-datareader pyupbit pytz requests 

      - name: Run Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
