name: Stock and Crypto Bot

on:
  schedule:
    - cron: '0,30 * * * *'  # 매일 30분마다 (요일 제한 없음)
  workflow_dispatch:        # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas pandas_ta FinanceDataReader requests pytz pyupbit
          
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
