name: Market Hours Monitor
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v3에서 v4로 업데이트 (Node 20+ 지원)
      - uses: actions/checkout@v4 

      # v4에서 v5로 업데이트 (Node 20+ 지원)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas finance-datareader pyupbit pytz requests
      - name: Run Realtime Loop
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
